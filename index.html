<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Auto Window Opener</title>
   <style>
       body {
           font-family: Arial, sans-serif;
           text-align: center;
           padding-top: 50px;
           background-color: #f4f4f9;
       }
       button {
           padding: 15px 30px;
           font-size: 18px;
           cursor: pointer;
           background-color: #007BFF;
           color: white;
           border: none;
           border-radius: 5px;
           margin: 10px;
       }
       button:hover {
           background-color: #0056b3;
       }
       input {
           padding: 10px;
           font-size: 16px;
           border: 1px solid #ddd;
           border-radius: 5px;
           width: 150px;
       }
       label {
           font-size: 16px;
           margin-right: 10px;
       }
       div {
           margin: 20px 0;
       }
       p {
           color: #666;
           margin-top: 20px;
       }
   </style>
</head>
<body>

   <h1>Automated Launcher</h1>
   <div>
       <label for="count">How many to open:</label>
       <input type="number" id="count" placeholder="Enter number" value="5" min="1">
   </div>
   <div style="margin-top: 20px;">
       <button onclick="openTabs()">Open as Tabs</button>
       <button onclick="openWindows()">Open as Windows</button>
   </div>
   <p>Note: If windows do not open, check your browser bar for a blocked popup notification and allow them.</p>

   <script>
       function getCount() {
           const count = parseInt(document.getElementById('count').value);
           return isNaN(count) || count < 1 ? 1 : count;
       }

       function openTabs() {
           const count = getCount();
           for (let i = 0; i < count; i++) {
               window.open('https://www.google.com', '_blank');
           }
       }

       function openWindows() {
           const count = getCount();
           for (let i = 0; i < count; i++) {
               window.open('https://www.google.com', '', 'width=800,height=600');
           }
       }
   </script>

</body>
</html>
