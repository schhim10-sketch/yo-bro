<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Auto Window Opener</title>
   <style>
       body {
           font-family: Arial, sans-serif;
           text-align: center;
           padding-top: 50px;
           background-color: #f4f4f9;
       }
       button {
           padding: 15px 30px;
           font-size: 18px;
           cursor: pointer;
           background-color: #007BFF;
           color: white;
           border: none;
           border-radius: 5px;
           margin: 10px;
       }
       button:hover {
           background-color: #0056b3;
       }
       input {
           padding: 10px;
           font-size: 16px;
           border: 1px solid #ddd;
           border-radius: 5px;
           width: 150px;
       }
       label {
           font-size: 16px;
           margin-right: 10px;
       }
       div {
           margin: 20px 0;
       }
       p {
           color: #666;
           margin-top: 20px;
       }
   </style>
</head>
<body>

   <h1>Automated Launcher</h1>
   <div>
       <label for="count">How many to open:</label>
       <input type="number" id="count" placeholder="Enter number" value="5" min="1">
   </div>
   <div style="margin-top: 20px;">
       <button onclick="openTabs()">Open as Tabs</button>
       <button onclick="openWindows()">Open as Windows</button>
   </div>
 
<h1><strong>Made By Sovan</strong></h1>
   <script>
       function getCount() {
           const count = parseInt(document.getElementById('count').value);
           return isNaN(count) || count < 1 ? 1 : count;
       }

       function openTabs() {
           const count = getCount();
           for (let i = 0; i < count; i++) {
               window.open('https://www.google.com', '_blank');
           }
       }

       function openWindows() {
           const count = getCount();
           for (let i = 0; i < count; i++) {
               window.open('https://www.google.com', '', 'width=800,height=600');
           }
       }
   </script>
   <!-- Clock Section -->
<div class="clock-container">
<div class="time" id="clock">00:00:00 AM</div>
<!-- Added date element -->
<div class="date" id="date">Loading Date...</div>
<div class="label">Boston Time</div>
</div>


<!-- Inline Clock Script -->
<script>
function updateClock() {
const now = new Date();
// Time configuration
const timeOptions = {
timeZone: 'America/New_York',
hour: '2-digit',
minute: '2-digit',
second: '2-digit',
hour12: true
};
// New date configuration
const dateOptions = {
timeZone: 'America/New_York',
weekday: 'long',
year: 'numeric',
month: 'long',
day: 'numeric'
};
// Update both elements
document.getElementById('clock').textContent = now.toLocaleTimeString('en-US', timeOptions);
document.getElementById('date').textContent = now.toLocaleDateString('en-US', dateOptions);
}
// Run clock immediately and update every second
updateClock();
setInterval(updateClock, 1000);
</script>

</body>
</html>
